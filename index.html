<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Платформа</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
</head>

<body>

<div id="loginPage">
  <h2>Вход</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Пароль">
  <button onclick="login()">Войти</button>
</div>

<div id="mentorPage" class="hidden">
  <h2>Наставник</h2>

  <input id="taskTitle" placeholder="Название">
  <input id="taskClass" placeholder="Класс (например 7A)">

  <div id="builder"></div>

  <button onclick="addText()">Текст</button>
  <button onclick="addQuestion()">Вопрос</button>
  <button onclick="addImage()">Картинка</button>

  <button onclick="publishTask()">Опубликовать</button>

  <h3>Статистика</h3>
  <div id="stats"></div>
</div>

<div id="studentPage" class="hidden">
  <h2>Задания</h2>
  <div id="tasks"></div>
  <div id="player"></div>
</div>

<script src="app.js"></script>
</body>
</html>
